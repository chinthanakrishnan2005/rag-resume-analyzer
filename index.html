<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG Resume Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="background">
    <!-- Bubbles -->
    <div class="bubble" style="--size:60px; --left:10%; --speed:12s;"></div>
    <div class="bubble" style="--size:80px; --left:30%; --speed:18s;"></div>
    <div class="bubble" style="--size:40px; --left:50%; --speed:10s;"></div>
    <div class="bubble" style="--size:100px; --left:70%; --speed:22s;"></div>
    <div class="bubble" style="--size:50px; --left:85%; --speed:16s;"></div>
</div>

<div class="container">
    <header>
        <h1>RAG Resume Analyzer <span class="blink">💡</span></h1>
        <p>Upload your resume and ask questions. Get <span class="highlight">AI-powered insights</span> instantly!</p>
    </header>

    <main>
        <form action="/" method="POST" enctype="multipart/form-data" class="upload-form" id="form">
            <label for="resume">Choose your PDF resume</label>
            <input type="file" name="resume" id="resume" accept=".pdf" required>

            <label for="question">Ask a question about your resume</label>
            <input type="text" name="question" id="question" placeholder="E.g., What skills do I have?" required>

            <button type="submit" id="analyzeBtn">Analyze Resume</button>
            <div class="loader" id="loader" style="display:none;"></div>
        </form>

        {% if result %}
        <div class="result-card">
            <h2>Analysis Result</h2>
            <p>{{ result }}</p>
        </div>
        {% endif %}
    </main>

    <footer>
        <p>&copy; 2026 Resume Analyzer | Powered by <span class="highlight">OpenAI & FAISS</span></p>
    </footer>
</div>

<script>
const form = document.getElementById('form');
const loader = document.getElementById('loader');
const analyzeBtn = document.getElementById('analyzeBtn');

form.addEventListener('submit', () => {
    loader.style.display = 'block';
    analyzeBtn.disabled = true;
    analyzeBtn.innerText = "Analyzing...";
});
</script>

</body>
</html>
